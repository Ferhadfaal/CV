<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip.com - Update Your Introduction</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: linear-gradient(135deg, #0066cc, #00bfff);
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            color: #333;
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #0066cc;
        }
        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 35px;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,102,204,0.4);
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,102,204,0.5);
        }
        .deeplink {
            margin-top: 25px;
            font-size: 12px;
            color: #888;
            word-break: break-all;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Update Your Personal Introduction</h1>
        <p>Click the button below to update your profile introduction on Trip.com.</p>
        
        <button onclick="triggerDeepLink()">
            Update Introduction Now
        </button>
        
        <div id="deeplink" class="deeplink"></div>
    </div>

    <script>
        function triggerDeepLink() {
            const targetPage = "https://ferhadfaal.github.io/CV/trip/mpoc.html";
            const deepLink = "ctripglobal://webview?url=" + encodeURIComponent(targetPage);
            
            // نمایش deep link برای تست (اختیاری)
            document.getElementById("deeplink").textContent = deepLink;
            
            // باز کردن داخل اپ Trip.com
            window.location.href = deepLink;
        }
    </script>
</body>
</html>
