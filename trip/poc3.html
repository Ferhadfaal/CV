<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip WebView — Deep link</title>
    <style>
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --accent: #58a6ff;
        --muted: #8b949e;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        max-width: 520px;
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px;
      }
      h1 {
        font-size: 1.15rem;
        margin: 0 0 8px;
        font-weight: 600;
      }
      p {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.6;
        margin: 0 0 20px;
      }
      .target {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        word-break: break-all;
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 20px;
        color: #79c0ff;
        direction: ltr;
        text-align: left;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      a.btn,
      button.btn {
        display: block;
        text-align: center;
        text-decoration: none;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        padding: 14px 18px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: #0d1117;
      }
      a.btn.secondary,
      button.btn.secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--border);
      }
      .note {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        font-size: 0.8rem;
        color: var(--muted);
      }
      code {
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        background: #010409;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>  WebView  (Deep link)</h1>
  
      <div class="target" id="deeplink"></div>
      <div class="actions">
        <a class="btn" id="openLink" href="#">Send to app </a>
      </div>
      <div class="note">
         ADB 
        <br /><br />
        <code style="display: block; padding: 10px; margin-top: 8px; white-space: pre-wrap; word-break: break-all"
          >adb shell am start -a android.intent.action.VIEW -d "ctripglobal://webview?url=https://ferhadfaal.github.io/CV/trip/npoc.html"</code
        >
      </div>
    </div>
    <script>
      (function () {
        var targetPage = "https://ferhadfaal.github.io/CV/trip/npoc.html";
        var deepLink =
          "ctripglobal://webview?url=" + encodeURIComponent(targetPage);

        document.getElementById("deeplink").textContent = deepLink;

        var openLink = document.getElementById("openLink");
        openLink.href = deepLink;

        document.getElementById("copyBtn").addEventListener("click", function () {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(deepLink).then(function () {
              alert("لینک کپی شد.");
            });
            return;
          }
          var ta = document.createElement("textarea");
          ta.value = deepLink;
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
          } catch (e) {
          }
          document.body.removeChild(ta);
        });
      })();
    </script>
  </body>
</html>
