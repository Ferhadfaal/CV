<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Testing Utility</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }
        .console {
            border: 1px solid #333;
            padding: 10px;
            background-color: #111;
        }
        .function-call { color: #f0ad4e; }
        .log-entry { margin-bottom: 5px; }
    </style>
</head>
<body>
    <h2>Bridge Testing Interface</h2>
    <div class="console" id="log-output">
        <div class="log-entry">System ready.</div>
    </div>

    <script>
        function log(message, isCall = false) {
            const output = document.getElementById('log-output');
            const div = document.createElement('div');
            div.className = isCall ? 'log-entry function-call' : 'log-entry';
            div.textContent = `> ${message}`;
            output.appendChild(div);
        }

        // Generic callback handler for asynchronous bridge responses
        window.generic_bridge_callback = function(encodedData) {
            try {
                const decoded = atob(encodedData);
                log(`Callback received: ${decoded}`);
            } catch (e) {
                log(`Error decoding payload: ${e.message}`);
            }
        };

        async function runTests() {
            // Delay helper for sequencing
            const delay = ms => new Promise(res => setTimeout(res, ms));

            log('Initiating bridge tests...');
            await delay(1000);

            // Test 1: Generic Storage Bridge
            if (window.GenericStorageBridge && window.GenericStorageBridge.requestData) {
                log('Executing GenericStorageBridge.requestData()', true);
                window.GenericStorageBridge.requestData(JSON.stringify({ target: "token" }));
            } else {
                log('GenericStorageBridge object not found.');
            }

            await delay(1000);

            // Test 2: Generic Location Bridge
            if (window.GenericLocationBridge && window.GenericLocationBridge.getLocation) {
                log('Executing GenericLocationBridge.getLocation()', true);
                window.GenericLocationBridge.getLocation();
            } else {
                log('GenericLocationBridge object not found.');
            }
        }

        // Delay execution to ensure native bridges are injected
        setTimeout(runTests, 500);
    </script>
</body>
</html>
