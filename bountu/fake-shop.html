<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop & Services - SBB</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f8f9fa;
            color: #333;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .app-header {
            margin: 0;
            padding: 0;
            line-height: 0;
        }

        .app-header img {
            display: block;
            width: 100%;
            height: auto;
            vertical-align: top;
        }

        /* Welcome Box */
        .welcome-box {
            background: white;
            margin: 15px;
            padding: 18px 15px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Router Image */
        .router-container {
            text-align: center;
            margin: 35px 20px 25px;
        }

        .router-container img {
            width: 190px;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.15));
        }

        /* Content */
        .content {
            padding: 0 20px;
            text-align: center;
        }

        .content h2 {
            color: #003087;
            margin: 15px 0 12px;
            font-size: 1.45em;
        }

        /* Form */
        .form-box {
            background: white;
            margin: 20px;
            padding: 25px 20px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            box-sizing: border-box;
        }

        .btn-continue {
            background: #e30613;
            color: white;
            padding: 16px;
            font-size: 1.35em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }

        /* PoC Banner - کوتاه و وسط صفحه */
        .poc-banner {
            background: #003087;
            color: white;
            text-align: center;
            padding: 12px 15px;
            font-size: 0.95em;
            font-weight: 500;
            margin: 15px 20px;
            border-radius: 8px;
        }

        .app-footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            margin: 0;
            padding: 0;
            line-height: 0;
            z-index: 100;
        }

        .app-footer img {
            display: block;
            width: 100%;
            height: auto;
            vertical-align: top;
        }

        /* فاصله تا فوتر ثابت تا محتوا زیر عکس نرود */
        .page-wrap {
            padding-bottom: min(28vw, 140px);
        }
    </style>
</head>

<body>

    <header class="app-header">
        <img src="Header.png" alt="Shop &amp; Services">
    </header>

    <div class="page-wrap">

        <!-- Welcome Box -->
        <div class="welcome-box">
            <div>
                <strong>Hello!</strong><br>
                You are not logged in.
            </div>
            <button
                style="padding:10px 24px; border:2px solid #e30613; background:white; color:#e30613; border-radius:25px; font-weight:bold;">Login</button>
        </div>


        <!-- PoC Banner - کوتاه و در وسط -->
        <div class="poc-banner">
            PoC Demonstration Only<br>
            This page is created solely to prove the vulnerability.
        </div>

        <!-- Content + Form -->
        <div class="content">
            <h2>Special 50% Discount Offer</h2>
            <p style="font-size:1.15em; line-height:1.6;">
                To claim your limited discount on SBB travel tickets and packages,<br>
                please confirm your contact information below.
            </p>
        </div>

        <div class="form-box">
            <input type="email" placeholder="Email address" id="email">
            <input type="text" placeholder="Full name" id="name">
            <button onclick="submitPoC()" class="btn-continue">Continue to Claim Discount</button>
        </div>

    </div><!-- /.page-wrap -->

    <footer class="app-footer">
        <img src="Footer.png" alt="">
    </footer>

    <script>
        function submitPoC() {
            const email = document.getElementById('email').value.trim();
            if (email) {
                alert("✅ PoC Successful!\n\nThis demonstrates that attacker-controlled content can be displayed inside the official SBB application context.");
            } else {
                alert("Please enter your email address");
            }
        }
    </script>

</body>

</html>
